services:
  app:
    # Build the standalone .devcontainer/Dockerfile.
    # Path-resolution rule: this is a single-file devcontainer (devcontainer.json
    # references just this compose file), so VS Code Dev Containers and `docker
    # compose -f docker-compose.yml` invoked from this folder both resolve
    # relative paths against THIS file's own directory (.devcontainer/).
    # So `context: .` correctly points at .devcontainer/ — the Dockerfile and
    # init-firewall.sh both live there.
    #
    # If you ever switch to multi-file (e.g. extending a workspace-root
    # docker-compose.yml), the resolution base shifts to the workspace root
    # because compose's default project-directory = first -f file's dir. In
    # that case use `context: ./.devcontainer` instead.
    build:
      context: .
      dockerfile: Dockerfile
      target: devcontainer

    # Hardening for running autonomous agents (no-permissions mode): block
    # privilege escalation and drop all Linux capabilities (Node dev needs none).
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      # Needed ONLY by init-firewall.sh at startup to program iptables/ipset.
      # The non-root `node` user the agent runs as cannot use these caps.
      - NET_ADMIN
      - NET_RAW
      # Uncomment ONLY if you extend the `command` below to drop from root →
      # node with `su node -c '...'` (e.g. to launch a dev server as node).
      # `su` calls setgroups()/setgid()/setuid(), which require CAP_SETGID /
      # CAP_SETUID even for root — under cap_drop: ALL these fail with "su:
      # cannot set groups: Operation not permitted". After the entrypoint
      # drops to node, these caps are idle for the rest of container life and
      # the agent (running as node) never inherits them.
      # - SETGID
      # - SETUID

    # Uncomment ONLY if your host is Linux (or you're on macOS but Docker
    # Desktop's bind-mount uid remap isn't kicking in for you — symptom is
    # files inside the container showing host uid 501 instead of `node`).
    # Adds the host's file-owner gid as a supplementary group on the
    # container's `node` user, so files on the host bind mount that are mode
    # 664 (group-writable) are writable from inside the container. Default
    # 20 is macOS's `staff` group; on Linux set HOST_GID in .env to whatever
    # `stat -c %g <a-host-file>` returns. Paired with `chmod g+w` on the
    # specific files you need to write (typically package.json, lockfiles).
    # group_add:
    #   - "${HOST_GID:-20}"

    volumes:
      # Mount ONLY the host project (workspace root, parent of .devcontainer/)
      # at /workspaces. With path-resolution base = this file's own dir, `..`
      # correctly points one level up = the workspace root. Keeps an agent's
      # blast radius to this one repo — sibling projects and loose secrets in
      # the parent dir are NOT exposed to the container.
      - ..:/workspaces:cached
      # Persist Claude Code's login/config across rebuilds so you only
      # `claude login` once. Pre-created node-owned in the Dockerfile so this
      # volume inits writable.
      - claude-config:/home/node/.claude
      # Optional: isolate generated/installed directories from the host bind
      # mount with named volumes. Why you'd want this:
      #   (a) prevents wrong-platform binaries from a host `npm install`
      #       (darwin) contaminating what the Linux container uses
      #   (b) speeds up I/O (named volumes are native FS; bind mounts are
      #       virtualized through Docker Desktop's file-sharing layer)
      #   (c) sidesteps EACCES on `npm ci`/`pip install` if your host's bind-
      #       mount uid mapping doesn't show files as node-owned
      # The Dockerfile chowns /workspaces to node at build time so these
      # volumes initialize node-owned on first mount. Mirror this pattern for
      # any other write-heavy generated dirs (e.g. /workspaces/.next,
      # /workspaces/generated, /workspaces/target, /workspaces/.venv).
      # - workspaces-node-modules:/workspaces/node_modules

    # If your project's dev server needs to be reachable from the host, expose
    # the port here. The egress firewall does not affect inbound to local dev.
    # ports:
    #   - "3000:3000"

    # Run the egress allowlist firewall as root (PID 1 holds NET_ADMIN), then
    # idle. `; exec` (not `&&`) keeps the container up even if the firewall
    # script errors, so you can always attach to debug. VS Code attaches over
    # Docker's exec channel, which the firewall does not affect.
    command: ["/bin/sh", "-c", "/usr/local/bin/init-firewall.sh || echo '[init-firewall] FAILED'; exec sleep infinity"]

    # To pull in additional services (DB, cache, etc.), add them below and
    # reference them as depends_on. Example:
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  # Example sidecars — uncomment one (or more) and adapt for your stack.
  # postgres:
  #   image: postgres:16
  #   environment:
  #     POSTGRES_PASSWORD: dev
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD", "pg_isready", "-U", "postgres"]
  #     interval: 5s

  # MongoDB as a single-node replica set. Prisma's Mongo provider REQUIRES a
  # replica set, so this runs `--replSet rs0` and the healthcheck initiates
  # rs0 on first boot, then reports healthy once primary. Drop the replSet
  # bits if you're using the native driver and don't need transactions.
  # mongo:
  #   image: mongo:7
  #   restart: unless-stopped
  #   command: ["--replSet", "rs0", "--bind_ip_all"]
  #   volumes:
  #     - mongo-data:/data/db
  #   healthcheck:
  #     test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }).ok }\""]
  #     interval: 10s
  #     timeout: 10s
  #     retries: 12
  #     start_period: 20s

volumes:
  claude-config:
  # workspaces-node-modules:
  # pg-data:
  # mongo-data:
